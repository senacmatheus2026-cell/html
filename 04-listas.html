<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas em HTML 5</title>
</head>
<body>
   <h1>Listas em HTML 5</h1>
   <h3>Lista não Ordenada</h3>
   <ul>
    <Li>Pão</Li>
    <li>Leite</li>
    <li>Café</li>
    <li>bolacha</li>
   </ul>

   <h3>Lista Ordenada</h3>
   <ol>
    <li>Molhar o Cabelo</li>
    <li>Passar o shampoo</li>
    <li>Enxaguar o cabelo</li>
    <li>passar o condicionador</li>
    <li>Enxaguar o cabelo para retirar o condicionador</li>
   </ol>
</body>
</html>
